$kind: http-request
description: |-
  Test budget planner with matches that don't cover all 3 countries.

  Constraint: User MUST attend at least 1 match in USA, Mexico, AND Canada.

  Expected: feasible=false with missingCountries listing countries to add.
url: "{{baseUrl}}/api/route/budget"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "budget": 5000.00,
        "matchIds": ["match-3", "match-4", "match-5"],
        "originCityId": "city-atlanta"
    }
order: 3000
