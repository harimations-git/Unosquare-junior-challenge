$kind: http-request
name: Optimise Route
description: |-
  Optimise travel route for selected matches.

  Request body: { "matchIds": ["match-1", "match-5", ...] }

  Expected response: { stops: [...], totalDistance: number, strategy: string }
url: "{{baseUrl}}/api/route/optimise"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "matchIds": ["match-1", "match-5", "match-12", "match-20"],
        "originCityId": "city-new-york"
        }
order: 1000
